version: '3.8'

services:
  amnezia-wg:
    image: amnezia/amneziawg:latest
    container_name: amnezia-wg
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/config
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3

  xray:
    image: amnezia/xray:latest
    container_name: xray-reality
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    volumes:
      - ./config:/config

  updater:
    image: containrrr/watchtower:latest
    container_name: stealth-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_GRACE_PERIOD=30s
    command: --interval 1800 --cleanup --grace-period 30s --rolling-restart